<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendations</title>
    <style>
        /* Reset & base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }
        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f0a500;
        }
        nav .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-right: 1.5rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav .nav-links a:hover {
            color: #f0a500;
        }
        nav .search-section form {
            display: flex;
            gap: 0.5rem;
        }
        nav input[type="search"] {
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            outline: none;
        }
        nav button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            background: #f0a500;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        nav button:hover {
            background: #cf8b00;
        }

        /* Hero section */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 80vh;
            padding: 2rem;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            margin-bottom: 2rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        .social-icons {
            display: flex;
            gap: 1.5rem;
        }
        .social-icons a {
            color: #fff;
            font-size: 1.8rem;
            transition: color 0.3s;
        }
        .social-icons a:hover {
            color: #f0a500;
        }

        /* Results */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .result-card {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            overflow: hidden;
            color: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .result-card:hover {
            transform: translateY(-5px);
        }
        .result-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .result-card .info {
            padding: 1rem;
        }
        .result-card .info h3 {
            margin-bottom: 0.5rem;
        }
        .result-card .info p {
            font-size: 0.9rem;
        }
        .time-display {
            font-weight: bold;
            color: #f0a500;
        }
    </style>
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">🌍 TravelWise</div>
        <div class="nav-links">
            <a href="travel_recommendation.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <div class="search-section">
            <form id="searchForm">
                <input type="search" id="searchInput" placeholder="Enter a keyword...">
                <button type="submit">Search</button>
                <button type="reset" id="clearBtn">Clear</button>
            </form>
        </div>
    </nav>

    <section id ="results" class="hero">
        <h1>Discover Your Next Adventure</h1>
        <p>Search for breathtaking beaches, ancient temples, or vibrant countries. Get personalized recommendations and start planning your dream trip today!</p>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </section>



    <script src="travel_recommendation.js"></script>
</body>
</html>
